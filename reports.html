<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="View attendance reports - Student Attendance Management System">
  
  <title>Reports - Attendance App</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Icons -->
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" href="icons/icon-72x72.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="reports">
  <!-- Header -->
  <header class="app-header">
    <h1>
      <i class="fas fa-chart-bar"></i>
      Reports
    </h1>
    <div class="header-actions">
      <span id="sync-status" class="sync-status offline">
        <i class="fas fa-wifi-slash"></i> Offline
      </span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Filters -->
    <div class="card">
      <div class="filter-row">
        <div>
          <label class="form-label">Start Date</label>
          <input type="date" class="form-input" id="report-start-date">
        </div>
        <div>
          <label class="form-label">End Date</label>
          <input type="date" class="form-input" id="report-end-date">
        </div>
      </div>
      
      <div class="filter-row" style="margin-top: 0.75rem;">
        <select class="form-select" id="report-course-filter">
          <option value="">All Courses</option>
        </select>
        <select class="form-select" id="report-batch-filter">
          <option value="">All Batches</option>
        </select>
      </div>
      
      <button class="btn btn-primary w-100 mt-1" id="generate-report-btn">
        <i class="fas fa-sync-alt"></i> Generate Report
      </button>
    </div>

    <!-- Report Container -->
    <div id="report-container">
      <div class="empty-state">
        <i class="fas fa-chart-pie"></i>
        <h3>Generate a Report</h3>
        <p>Select date range and filters to view attendance report</p>
      </div>
    </div>

    <!-- Export Buttons -->
    <div class="card" id="export-section" style="display: none;">
      <div class="card-header">
        <h2 class="card-title">
          <i class="fas fa-download"></i>
          Export Report
        </h2>
      </div>
      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem;">
        <button class="btn btn-success" id="export-csv-btn">
          <i class="fas fa-file-csv"></i> Export CSV
        </button>
        <button class="btn btn-primary" id="export-json-btn">
          <i class="fas fa-file-code"></i> Export JSON
        </button>
      </div>
    </div>

    <!-- Legend -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">
          <i class="fas fa-info-circle"></i>
          Legend
        </h2>
      </div>
      <div style="display: flex; flex-direction: column; gap: 0.5rem; font-size: 0.875rem;">
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <div style="width: 20px; height: 20px; background: rgba(16, 185, 129, 0.1); border-radius: var(--radius);"></div>
          <span>Good attendance (≥75%)</span>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <div style="width: 20px; height: 20px; background: rgba(239, 68, 68, 0.05); border-radius: var(--radius);"></div>
          <span style="color: var(--danger-color); font-weight: 600;">Low attendance (&lt;75%)</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <i class="fas fa-home"></i>
      <span>Dashboard</span>
    </a>
    <a href="students.html" class="nav-item">
      <i class="fas fa-users"></i>
      <span>Students</span>
    </a>
    <a href="attendance.html" class="nav-item">
      <i class="fas fa-clipboard-check"></i>
      <span>Attendance</span>
    </a>
    <a href="reports.html" class="nav-item active">
      <i class="fas fa-chart-bar"></i>
      <span>Reports</span>
    </a>
  </nav>

  <!-- Scripts -->
  <script src="js/db.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Show export section when report is generated
    const originalGenerateReport = generateReport;
    generateReport = async function() {
      await originalGenerateReport();
      const exportSection = document.getElementById('export-section');
      if (exportSection && window.currentReportData && window.currentReportData.length > 0) {
        exportSection.style.display = 'block';
      }
    };
  </script>
</body>
</html>
