<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Take attendance - Student Attendance Management System">
  
  <title>Attendance - Attendance App</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Icons -->
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" href="icons/icon-72x72.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="attendance">
  <!-- Header -->
  <header class="app-header">
    <h1>
      <i class="fas fa-clipboard-check"></i>
      Take Attendance
    </h1>
    <div class="header-actions">
      <span id="sync-status" class="sync-status offline">
        <i class="fas fa-wifi-slash"></i> Offline
      </span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Date & Filters -->
    <div class="card">
      <div class="date-picker-container">
        <label class="form-label" style="margin-bottom: 0;">Date:</label>
        <input type="date" class="form-input" id="attendance-date">
      </div>
      
      <div class="filter-row">
        <select class="form-select" id="attendance-course-filter">
          <option value="">All Courses</option>
        </select>
        <select class="form-select" id="attendance-batch-filter">
          <option value="">All Batches</option>
        </select>
      </div>
      
      <!-- Quick Actions -->
      <div style="display: flex; gap: 0.5rem; margin-top: 0.75rem;">
        <button class="btn btn-sm btn-success" id="mark-all-present">
          <i class="fas fa-check"></i> All Present
        </button>
        <button class="btn btn-sm btn-danger" id="mark-all-absent">
          <i class="fas fa-times"></i> All Absent
        </button>
      </div>
    </div>

    <!-- Attendance List -->
    <div id="attendance-list">
      <div class="empty-state">
        <i class="fas fa-spinner fa-spin"></i>
        <h3>Loading students...</h3>
      </div>
    </div>

    <!-- Save Button -->
    <div style="position: fixed; bottom: calc(var(--nav-height) + 1rem); left: 1rem; right: 1rem; z-index: 100;">
      <button class="btn btn-primary btn-lg w-100" id="save-attendance-btn" style="box-shadow: var(--shadow-lg);">
        <i class="fas fa-save"></i>
        Save Attendance
      </button>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <i class="fas fa-home"></i>
      <span>Dashboard</span>
    </a>
    <a href="students.html" class="nav-item">
      <i class="fas fa-users"></i>
      <span>Students</span>
    </a>
    <a href="attendance.html" class="nav-item active">
      <i class="fas fa-clipboard-check"></i>
      <span>Attendance</span>
    </a>
    <a href="reports.html" class="nav-item">
      <i class="fas fa-chart-bar"></i>
      <span>Reports</span>
    </a>
  </nav>

  <!-- Scripts -->
  <script src="js/db.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
